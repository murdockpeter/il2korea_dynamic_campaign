<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IL-2 Korea Scenario Generator</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <section class="hero-banner" aria-label="IL-10 hero artwork">
          <div class="hero-copy">
            <p class="eyebrow">IL-2 Korea</p>
            <h1>Scenario Generator</h1>
            <p class="subhead">Choose a few constraints, then generate one plausible single-scenario seed.</p>
          </div>
          <div class="hero-art">
            <img src="../images/hero_banner_il10.png" alt="IL-10 artwork banner" />
          </div>
        </section>

        <div class="heading">
          <p class="section-kicker">Mission Setup</p>
        </div>

        <section class="install-panel" aria-label="IL-2 install path">
          <div class="install-panel-copy">
            <p class="section-kicker">Install Detection</p>
            <p id="install-summary" class="install-summary">Checking for IL-2 Korea install...</p>
          </div>
          <div class="install-controls">
            <input
              id="installDir"
              class="install-input"
              type="text"
              placeholder="C:\IL2Series or C:\IL2Series\game"
              spellcheck="false"
            />
            <button id="browseInstallDir" type="button" class="secondary-button">Browse</button>
            <button id="saveInstallDir" type="button" class="secondary-button">Save Path</button>
            <button id="clearInstallDir" type="button" class="secondary-button secondary-button-muted">Auto Detect</button>
          </div>
        </section>

        <form id="scenario-form" class="form">
          <label class="field">
            <span>Player Aircraft</span>
            <select id="aircraft" name="aircraft"></select>
          </label>

          <label class="field">
            <span>Target Type</span>
            <select id="targetType" name="targetType"></select>
          </label>

          <label class="field">
            <span>Landscape</span>
            <select id="landscape" name="landscape"></select>
          </label>

          <label class="field">
            <span>Enemy Faction</span>
            <select id="enemyFaction" name="enemyFaction"></select>
          </label>

          <label class="field">
            <span>Weather</span>
            <select id="weather" name="weather">
              <option value="Clear">Clear</option>
              <option value="Broken Cloud">Broken Cloud</option>
              <option value="Overcast">Overcast</option>
              <option value="Poor Visibility">Poor Visibility</option>
            </select>
          </label>

          <label class="field">
            <span>Start Time</span>
            <select id="startTime" name="startTime"></select>
          </label>

          <label class="field field-slider">
            <span>Front Line</span>
            <div class="slider-shell">
              <input id="frontLine" name="frontLine" type="range" min="0" max="100" step="5" value="50" />
              <p id="frontLineLabel" class="slider-label">50 • Mid-conflict stalemate</p>
            </div>
          </label>

          <label class="field">
            <span>Starting Airfield</span>
            <select id="startAirfield" name="startAirfield"></select>
          </label>

          <div class="field field-checkbox">
            <span>Multiplayer</span>
            <label class="checkbox-row" for="coopFriendly">
              <input id="coopFriendly" name="coopFriendly" type="checkbox" />
              <span>COOP-friendly player flight</span>
            </label>
          </div>

          <div class="field field-checkbox">
            <span>Generator Mode</span>
            <label class="checkbox-row" for="useScratchBuilder">
              <input id="useScratchBuilder" name="useScratchBuilder" type="checkbox" />
              <span id="generator-mode-label">Experimental generator temporarily disabled</span>
            </label>
          </div>

          <button id="generate-button" type="submit" class="generate-button">Generate Scenario</button>
        </form>

        <section class="output">
          <div class="output-header">
            <h2>Latest Output</h2>
            <p id="status">Loading catalog...</p>
          </div>
          <pre id="result" class="result">No scenario generated yet.</pre>
        </section>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
